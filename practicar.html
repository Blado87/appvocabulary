<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica de Vocabulario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #ffffff; color: #333; font-family: system-ui, -apple-system, sans-serif; }
    .progress { background-color: #f0f0f0; border-radius: 20px; }
    .term-section { padding: 3rem 0; text-align: center; }
    .term-section h1 { font-weight: 800; color: #000; font-size: 3rem; }
    .form-control-minimal {
      border: none; border-bottom: 2px solid #eee; border-radius: 0;
      padding: 1rem 0; font-size: 1.5rem; background: transparent; transition: border-color 0.3s ease;
      text-align: center;
    }
    .form-control-minimal:focus { outline: none; box-shadow: none; border-bottom-color: #0d6efd; }
    .status-msg { font-size: 1rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-action { padding: 1rem; font-weight: 600; border-radius: 12px; }
  </style>
</head>
<body id="practice-engine">
  <nav class="py-4">
    <div class="container d-flex align-items-center gap-4">
      <a href="index.html" class="btn-close" style="font-size: 0.8rem;"></a>
      <div class="progress flex-grow-1" style="height: 8px;">
        <div class="progress-bar bg-primary " style="width: 0%"></div>
      </div>
      <span class="small text-muted fw-bold" id="progress-text">0/0</span>
    </div>
  </nav>

  <main class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="mb-4 text-center" style="min-height: 60px;">
          <div id="feedback-success" class="status-msg text-success d-none">
            <i class="bi bi-check2-circle fs-4"></i> ¡Correcto!
          </div>
          <div id="feedback-error" class="status-msg text-danger d-none">
            <i class="bi bi-x-circle fs-4"></i> Respuesta: <span class="fw-bold" id="correct-answer-msg"></span>
          </div>
        </div>

        <div class="term-section">
          <p class="text-muted mb-0 small text-uppercase fw-bold">Traduce al inglés</p>
          <h1 id="term-display">Cargando...</h1>
        </div>

        <div class="mt-2 mb-5">
          <input type="text" class="form-control-minimal w-100" id="answerInput" placeholder="Escribe aquí..." autocomplete="off">
        </div>

        <div class="d-grid">
          <button onclick="checkAnswer()" class="btn btn-primary btn-action shadow-none" type="button">
            COMPROBAR
          </button>
        </div>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
