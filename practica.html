<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-practice" style="background-image: url('background_app.jpeg');" >

    <header class="top-bar">
        <a href="index.html" class="btn-back-home">
            <img src="boton-inicio.png" alt="Inicio">
        </a>
    </header>

    <main class="main-wrapper">
        <div class="practice-box">
            <p style="text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);">Traduce la palabra</p>
            <h1 class="word-to-translate">Welcome</h1>
            
            <div class="input-group">
                <input type="text" placeholder="Escribe aquí..." autofocus>
                <button class="btn btn-primary">Validar Respuesta</button>
            </div>
        </div>

        <div class="notificacion" style="display:none; margin-top: 20px; padding: 15px; background: #d4edda; color: #155724; border-radius: 8px; text-align: center;">
            <strong>¡Excelente!</strong> Sigue así.
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
