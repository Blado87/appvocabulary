<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Términos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
  <nav class="navbar bg-white shadow-sm mb-4">
    <div class="container-fluid">
        <a href="index.html" class="btn-close"></a>
    </div>
  </nav>

  <main class="container">
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th scope="col" style="width: 10%">#</th>
                  <th scope="col">Español</th>
                  <th scope="col">Inglés</th>
                </tr>
              </thead>
              <tbody id="lista-table-body">
                  </tbody>
            </table>
        </div>
    </div>

    <div class="d-grid gap-2 mb-5">
      <button id="btn-practicar-desde-lista" class="btn btn-primary btn-lg" type="button">
        <i class="bi bi-rocket-takeoff-fill"></i> Practicar esta sección
      </button>
    </div>
  </main>
  
  <script src="script.js"></script>
</body>
</html>
